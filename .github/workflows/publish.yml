name: publish
# Tokenless npm publish via OIDC Trusted Publishing (no NPM_TOKEN to store/rotate).
# One-time setup: (1) bootstrap-publish once locally so the package exists, then
# (2) configure the Trusted Publisher on npmjs.com (package → Settings → Trusted Publisher
# → GitHub Actions → repo TheQmaks/skillseek, workflow publish.yml).
# Thereafter: publishing a GitHub Release runs this and publishes automatically.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest   # OIDC trusted publishing needs npm >= 11.5
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish   # tokenless via OIDC; provenance attached automatically
